name: Notes App CI

on:
  push:
    branches:
      - main

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Create .env file
        run: |
          cat <<EOF > backend/.env
          DB_HOST=${{ secrets.DB_HOST }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_PORT=${{ secrets.DB_PORT }}
          PORT=${{ secrets.PORT }}
          EOF

      - name: Install Dependencies
        working-directory: backend
        run: npm install

      - name: Run Tests
        working-directory: backend
        run: npm test --if-present

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/notes-backend:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/notes-backend:${{ github.sha }} \
            ./backend

      - name: Run Docker Container
        run: |
          docker run -d \
            --name notes-app \
            -p 3000:3000 \
            --env-file backend/.env \
            ${{ secrets.DOCKER_USERNAME }}/notes-backend:latest

      - name: Verify Container
        run: |
          sleep 15
          docker ps
          docker logs notes-app

      - name: Check Application
        run: |
          curl -f http://localhost:3000 || exit 1

      - name: Push Docker Images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/notes-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/notes-backend:${{ github.sha }}
