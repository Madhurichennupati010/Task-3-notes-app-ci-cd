name: Notes App CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  notes-app-ci:
    name: Build, Test & Publish
    runs-on: ubuntu-latest

    steps:

    # ===============================
    # Checkout Repository
    # ===============================
    - name: Checkout Repository Source Code
      uses: actions/checkout@v4

    # ===============================
    # Setup Node.js
    # ===============================
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    # ===============================
    # Create Environment File
    # ===============================
    - name: Create Backend .env File
      run: |
        cat <<EOF > backend/.env
        DB_HOST=${{ secrets.DB_HOST }}
        DB_USER=${{ secrets.DB_USER }}
        DB_PASSWORD=${{ secrets.DB_PASSWORD }}
        DB_NAME=${{ secrets.DB_NAME }}
        DB_PORT=${{ secrets.DB_PORT }}
        PORT=${{ secrets.PORT }}
        EOF

    # ===============================
    # Install Dependencies
    # ===============================
    - name: Install Dependencies
      working-directory: backend
      run: npm install

    # ===============================
    # Run Tests
    # ===============================
    - name: Run Application Tests
      working-directory: backend
      run: npm test --if-present

    # ===============================
    # Login to Docker Hub
    # ===============================
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # ===============================
    # Build Backend Docker Image
    # ===============================
    - name: Build Backend Docker Image
      run: |
        docker build \
        -t ${{ secrets.DOCKER_USERNAME }}/notes-backend:latest \
        -t ${{ secrets.DOCKER_USERNAME }}/notes-backend:${{ github.sha }} \
        ./backend

    # ===============================
    # Build Nginx Docker Image
    # ===============================
    - name: Build Nginx Docker Image
      run: |
        docker build \
        -t ${{ secrets.DOCKER_USERNAME }}/notes-nginx:latest \
        -t ${{ secrets.DOCKER_USERNAME }}/notes-nginx:${{ github.sha }} \
        ./nginx

    # ===============================
    # Start Docker Compose
    # ===============================
    - name: Start Docker Compose Environment
      run: docker compose up -d

    # ===============================
    # Wait for Containers
    # ===============================
    - name: Wait for Services
      run: sleep 40

    # ===============================
    # Verify Containers
    # ===============================
    - name: Verify Running Containers
      run: |
        docker compose ps
        docker ps

    # ===============================
    # Display Container Logs
    # ===============================
    - name: Display Container Logs
      run: docker compose logs

    # ===============================
    # Backend Health Check
    # ===============================
    - name: Backend API Health Check
      run: |
        curl --fail http://localhost:3000/api/notes

    # ===============================
    # Frontend Health Check
    # ===============================
    - name: Frontend Health Check
      run: |
        curl --fail http://localhost:3000

    # ===============================
    # Push Backend Image
    # ===============================
    - name: Push Backend Docker Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/notes-backend:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/notes-backend:${{ github.sha }}

    # ===============================
    # Push Nginx Image
    # ===============================
    - name: Push Nginx Docker Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/notes-nginx:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/notes-nginx:${{ github.sha }}


