name: Notes App CI

on:
  push:
    branches:
      - main

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        working-directory: backend
        run: npm install

      - name: Run Tests
        working-directory: backend
        run: npm test --if-present

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/notes-backend:${{ github.sha }} \
            -t ${{ secrets.DOCKER_USERNAME }}/notes-backend:latest \
            ./backend

      - name: Run Docker Container
        run: |
          docker run -d \
            --name notes-app \
            -p 5000:5000 \
            ${{ secrets.DOCKER_USERNAME }}/notes-backend:latest

      - name: Verify Container is Running
        run: |
          sleep 10
          docker ps
          docker logs notes-app

      - name: Stop and Remove Container
        if: always()
        run: |
          docker stop notes-app || true
          docker rm notes-app || true

      - name: Push Docker Images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/notes-backend:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/notes-backend:latest
