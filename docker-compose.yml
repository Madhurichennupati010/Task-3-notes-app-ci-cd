version: "3.9"

services:

  mysql:
    image: mysql:8.0
    container_name: mysql

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: notesdb

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: ./backend
    container_name: notes-app-compose

    restart: always

    expose:
      - "3000"

    env_file:
      - ./backend/.env

    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    build: ./nginx
    container_name: nginx

    restart: always

    ports:
      - "3000:80"

    depends_on:
      - app

volumes:
  mysql_data: