<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>📝 Notes App</h1>

    <form id="noteForm">

        <input
            type="text"
            id="title"
            placeholder="Enter Title"
            required
        >

        <textarea
            id="content"
            placeholder="Write your note..."
            rows="5"
            required
        ></textarea>

        <button type="submit">
            Add Note
        </button>

    </form>

    <hr>

    <h2>📒 Saved Notes</h2>

    <div id="notesContainer">

        <!-- Notes will appear here -->

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
